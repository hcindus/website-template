<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Company | Autonomous AI Operations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d0d0d;
            --card: #141414;
            --border: #1f1f1f;
            --text: #e5e5e5;
            --muted: #737373;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.1);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        a { color: #22d3ee; text-decoration: none; }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Header */
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(13,13,13,0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
        }
        
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
        }
        
        .mobile-nav {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(13,13,13,0.98);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            z-index: 99;
            flex-direction: column;
            gap: 12px;
        }
        
        .mobile-nav.open { display: flex; }
        
        .mobile-nav a {
            color: var(--text);
            font-size: 1.1rem;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
        }
        
        .mobile-nav a:hover { color: var(--accent); }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .logo span { color: #a855f7; }
        
        .price, .service-price, .amount, .amount { color: #228B22; } .price-box .amount { color: #228B22; } .stat .number { color: #228B22; }
        
        nav { display: flex; gap: 32px; }
        nav a { margin: 0 4px; color: var(--muted); font-size: 0.9rem; transition: color 0.2s; }
        nav a:hover, nav a.active { color: #22d3ee; font-weight: 700; }
        
        /* Page Title */
        .page-title {
            padding: 60px 0 40px;
            text-align: center;
        }
        
        .page-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .page-title p { color: var(--muted); font-size: 1.1rem; }
        
        /* Agent Categories */
        .category { padding: 0 0 60px; }
        
        .category h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .agent-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s;
        }
        
        .agent-card:hover {
            border-color: #22d3ee;
            transform: translateY(-2px);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }
        
        .agent-avatar {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }
        
        .agent-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .agent-card .role {
            color: #22d3ee;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .agent-card .desc {
            color: var(--muted);
            font-size: 0.9rem;
        }
        
        .agent-card .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #4ade80;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--muted);
            font-size: 0.875rem;
        }
            .ai-chat-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 1000; box-shadow: 0 4px 20px rgba(59,130,246,0.5); transition: transform 0.2s; }
        .ai-chat-btn:hover { transform: scale(1.1); }

        .chat-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .team-preview h2 { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
        .section-desc { text-align: center; color: var(--muted); margin-bottom: 40px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .team-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; text-decoration: none; transition: all 0.2s; }
        .team-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .team-card img { width: 100%; height: 180px; object-fit: cover; }
        .team-info { padding: 16px; text-align: center; }
        .team-info h3 { font-size: 1rem; color: var(--text); margin-bottom: 4px; }
        .team-info p { font-size: 0.85rem; color: var(--accent); }
        .view-all-btn { display: block; text-align: center; color: var(--accent); text-decoration: none; font-weight: 600; }

        @media (max-width: 768px) {
            nav { display: none; }
            .mobile-menu-btn { display: block; }
            .mobile-nav { display: none; }
            .mobile-nav.open { display: flex; }
            .container { padding: 0 16px; }
            .hero { padding: 60px 20px; }
            .hero h1 { font-size: 2rem; }
            .hero p { font-size: 1rem; }
            .page-title { padding: 40px 0 30px; }
            .page-title h1 { font-size: 1.8rem; }
            .section { padding: 40px 0; }
            .services-grid, .team-grid, .software-grid { grid-template-columns: 1fr; gap: 20px; }
            .service-card, .team-card, .software-card { padding: 20px; }
            .stats-row { flex-wrap: wrap; gap: 20px; }
            .cta-buttons { flex-direction: column; gap: 12px; }
            .cta-buttons a { width: 100%; text-align: center; }
            footer { padding: 30px 16px; }
            .ai-chat-widget { bottom: 10px; right: 10px; }
            .payment-cards { grid-template-columns: 1fr; }
            .payment-card { padding: 16px; }
            .crypto-details { padding: 16px; }
        }
        
        @media (max-width: 480px) {
            .hero h1 { font-size: 1.6rem; }
            .hero-buttons { flex-direction: column; }
            .service-icon { width: 50px; height: 50px; font-size: 1.5rem; }
            .service-header h2 { font-size: 1.25rem; }
            .tagline { font-size: 0.85rem; }
            .service-price { font-size: 1.2rem; }
            .features-list li { font-size: 0.85rem; }
        }

    </style>
</head>
