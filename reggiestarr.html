<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReggieStarr - Point of Sale, Evolved | AGI Company</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0d0d0d; --card: #141414; --border: #1f1f1f; --text: #e5e5e5; --muted: #737373; --accent: #228B22; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
        a { color: var(--accent); text-decoration: none; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
        .back-btn { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); z-index: 100; }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }
        header { padding: 80px 0 40px; text-align: center; border-bottom: 1px solid var(--border); }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; }
        .tagline { color: #f97316; font-size: 1.2rem; font-weight: 500; }
        section { padding: 40px 0; border-bottom: 1px solid var(--border); }
        h2 { font-size: 1.5rem; margin-bottom: 20px; color: var(--accent); }
        p { color: var(--muted); margin-bottom: 16px; }
        .highlight { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin: 20px 0; }
        ul { list-style: none; margin: 20px 0; }
        li { color: var(--muted); padding: 10px 0; padding-left: 28px; position: relative; border-bottom: 1px solid var(--border); }
        li:last-child { border-bottom: none; }
        li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .stat { background: var(--card); border-radius: 12px; padding: 24px; text-align: center; }
        .stat .number { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat .label { font-size: 0.9rem; color: var(--muted); margin-top: 8px; }
        footer { padding: 40px 0; text-align: center; border-top: 1px solid var(--border); }
        footer p { opacity: 0.5; }
    
        .cart-btn { position: fixed; top: 20px; right: 80px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; z-index: 1000; }
        .cart-dialog { position: fixed; top: 70px; right: 20px; width: 320px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: none; z-index: 1001; }
        .cart-dialog.open { display: block; }
        .cart-header { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); }
        .cart-header h3 { font-size: 1rem; color: var(--accent); }
        .cart-header button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
        .cart-items { max-height: 300px; overflow-y: auto; padding: 16px; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .cart-item:last-child { border: none; }
        .cart-item button { background: none; border: none; color: #ef4444; cursor: pointer; margin-left: 8px; }
        .empty-cart { text-align: center; color: var(--muted); padding: 20px; }
        .cart-footer { padding: 16px; border-top: 1px solid var(--border); }
        .cart-total { font-size: 1.2rem; font-weight: 700; color: #228B22; margin-bottom: 12px; }
        .cart-pay-btn { display: block; width: 100%; padding: 12px; background: #228B22; color: white; text-align: center; border-radius: 8px; margin-bottom: 8px; }
        .cart-continue-btn { display: block; width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; }

        @media (max-width: 768px) {
            .page-title { padding: 40px 0 30px; }
            .page-title h1 { font-size: 1.8rem; }
            .page-title p { font-size: 1rem; }
            .hero { padding: 40px 20px; }
            .hero h1 { font-size: 1.6rem; }
            .features-grid { grid-template-columns: 1fr; gap: 16px; }
            .feature-card { padding: 20px; }
            .stats-row { flex-wrap: wrap; gap: 20px; }
            .stat-item { min-width: 80px; }
            .cta-buttons { flex-direction: column; gap: 12px; }
            .cta-buttons a { width: 100%; text-align: center; }
            .consult-btn, .back-btn { padding: 10px 16px; font-size: 0.9rem; }
            footer { padding: 30px 16px; }
        }


    function addToCart(name, price) { let cart = JSON.parse(localStorage.getItem('cart') || '[]'); cart.push({name, price}); localStorage.setItem('cart', JSON.stringify(cart)); updateCartDisplay(); }
    function removeFromCart(index) { let cart = JSON.parse(localStorage.getItem('cart') || '[]'); cart.splice(index, 1); localStorage.setItem('cart', JSON.stringify(cart)); updateCartDisplay(); }
    function updateCartDisplay() { let cart = JSON.parse(localStorage.getItem('cart') || '[]'); document.getElementById('cartCount').textContent = cart.length; let total = cart.reduce((sum, item) => sum + parseFloat(item.price), 0); document.getElementById('cartTotal').textContent = total.toFixed(2); let itemsHtml = cart.length === 0 ? '<p class="empty-cart">Your cart is empty</p>' : cart.map((item, i) => '<div class="cart-item"><span>' + item.name + '</span><span>$' + item.price + ' <button onclick="removeFromCart(' + i + ')">✕</button></span></div>').join(''); document.getElementById('cartItems').innerHTML = itemsHtml; if (cart.length > 0) { let itemNames = cart.map(i => i.name).join(', '); let itemPrices = cart.map(i => i.price).join(','); document.getElementById('cartPayBtn').href = '/payment.html?items=' + encodeURIComponent(itemNames) + '&total=' + total.toFixed(2); } }
    window.addEventListener('DOMContentLoaded', function() { updateCartDisplay(); });
    </script>
    <script>function toggleMobileMenu() { document.getElementById("mobileNav").classList.toggle("open"); }</script>

    <script>
    </script>

</body>
</html>
