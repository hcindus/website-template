<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Audit - AGI Company</title>
    <style>
        :root { --bg: #0d0d0d; --card: #141414; --border: #1f1f1f; --text: #e5e5e5; --muted: #737373; --accent: #22d3ee; --accent-dim: rgba(34, 211, 238, 0.1); --coral: #f97316; }
        body { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
        a { color: var(--accent); text-decoration: none; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
        
        .back-btn { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); z-index: 100; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }
        .consult-btn { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: #228B22; border: none; border-radius: 8px; color: white; font-weight: 600; z-index: 100; transition: all 0.2s; }
        .consult-btn:hover { transform: scale(1.05); }
        
        header { padding: 80px 0 40px; text-align: center; border-bottom: 1px solid var(--border); }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 8px; }
        .tagline { color: var(--coral); font-size: 1.2rem; font-weight: 500; }
        
        section { padding: 48px 0; border-bottom: 1px solid var(--border); }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: var(--accent); }
        p { color: var(--muted); margin-bottom: 16px; }
        ul { list-style: none; margin-bottom: 24px; }
        li { color: var(--muted); padding: 8px 0; padding-left: 24px; position: relative; }
        li::before { content: "\2192"; position: absolute; left: 0; color: var(--accent); }
        
        .highlight { background: var(--accent-dim); border-left: 4px solid var(--accent); padding: 24px; margin: 24px 0; border-radius: 0 8px 8px 0; }
        .highlight strong { color: var(--text); display: block; margin-bottom: 8px; }
        
        .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 24px 0; }
        .feature { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .feature strong { color: var(--accent); display: block; margin-bottom: 8px; }
        
        .cta { text-align: center; padding: 60px 0; }
        .cta h2 { color: var(--text); margin-bottom: 24px; }
        .price { font-size: 3rem; font-weight: 700; color: #228B22; margin-bottom: 20px; }
        .price span { font-size: 1.2rem; color: var(--muted); }
        .buy-btn { display: inline-block; padding: 16px 40px; background: #228B22; color: white; font-weight: 600; font-size: 1.1rem; border-radius: 8px; transition: all 0.2s; }
        .buy-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,139,34,0.3); }
    
        .cart-btn { position: fixed; top: 20px; right: 80px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; z-index: 1000; }
        .cart-dialog { position: fixed; top: 70px; right: 20px; width: 320px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: none; z-index: 1001; }
        .cart-dialog.open { display: block; }
        .cart-header { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); }
        .cart-header h3 { font-size: 1rem; color: var(--accent); }
        .cart-header button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
        .cart-items { max-height: 300px; overflow-y: auto; padding: 16px; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .cart-item:last-child { border: none; }
        .cart-item button { background: none; border: none; color: #ef4444; cursor: pointer; margin-left: 8px; }
        .empty-cart { text-align: center; color: var(--muted); padding: 20px; }
        .cart-footer { padding: 16px; border-top: 1px solid var(--border); }
        .cart-total { font-size: 1.2rem; font-weight: 700; color: #228B22; margin-bottom: 12px; }
        .cart-pay-btn { display: block; width: 100%; padding: 12px; background: #228B22; color: white; text-align: center; border-radius: 8px; margin-bottom: 8px; }
        .cart-continue-btn { display: block; width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; }


            .page-title h1 { font-size: 1.8rem; }
            .hero { padding: 40px 20px; }
            .hero h1 { font-size: 1.6rem; }
            .features-grid { grid-template-columns: 1fr; gap: 16px; }
            .feature-card { padding: 20px; }
            .stats-row { flex-wrap: wrap; gap: 20px; }
            .cta-buttons { flex-direction: column; gap: 12px; }
            .cta-buttons a { width: 100%; text-align: center; }
            footer { padding: 30px 16px; }
        }

        .lang-selector { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .lang-current { background: #36454F; color: white; border: 2px solid #555; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .lang-menu { display: none; position: absolute; top: 100%; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; overflow: hidden; margin-top: 4px; min-width: 150px; }
        .lang-menu.open { display: block; }
        .lang-menu button { display: block; width: 100%; padding: 10px 16px; background: none; border: none; color: white; text-align: left; cursor: pointer; }
        .lang-menu button:hover { background: #333; }

    function addToCart(name, price) { let cart = JSON.parse(localStorage.getItem('cart') || '[]'); cart.push({name, price}); localStorage.setItem('cart', JSON.stringify(cart)); updateCartDisplay(); }
    function removeFromCart(index) { let cart = JSON.parse(localStorage.getItem('cart') || '[]'); cart.splice(index, 1); localStorage.setItem('cart', JSON.stringify(cart)); updateCartDisplay(); }
    function updateCartDisplay() { let cart = JSON.parse(localStorage.getItem('cart') || '[]'); document.getElementById('cartCount').textContent = cart.length; let total = cart.reduce((sum, item) => sum + parseFloat(item.price), 0); document.getElementById('cartTotal').textContent = total.toFixed(2); let itemsHtml = cart.length === 0 ? '<p class="empty-cart">Your cart is empty</p>' : cart.map((item, i) => '<div class="cart-item"><span>' + item.name + '</span><span>$' + item.price + ' <button onclick="removeFromCart(' + i + ')">✕</button></span></div>').join(''); document.getElementById('cartItems').innerHTML = itemsHtml; if (cart.length > 0) { let itemNames = cart.map(i => i.name).join(', '); let itemPrices = cart.map(i => i.price).join(','); document.getElementById('cartPayBtn').href = '/payment.html?items=' + encodeURIComponent(itemNames) + '&total=' + total.toFixed(2); } }
    window.addEventListener('DOMContentLoaded', function() { updateCartDisplay(); });
    </script>
    <script>function toggleMobileMenu() { document.getElementById("mobileNav").classList.toggle("open"); }</script>

    <script>
    const translations = {
        en: { "Software": "Software", "Services": "Services", "Agents": "Agents", "Contact": "Contact", "Payment": "Payment", "Learn More": "Learn More", "Book a Consultation": "Book a Consultation", "24/7 Support": "24/7 Support", "AI Strategy": "AI Strategy", "Custom Development": "Custom Development", "Emergency Response": "Emergency Response", "Performance Analytics": "Performance Analytics", "Security Audit": "Security Audit", "System Integration": "System Integration", "Training": "Training" },
        es: { "Software": "Software", "Services": "Servicios", "Agents": "Agentes", "Contact": "Contacto", "Payment": "Pago", "Learn More": "Más Información", "Book a Consultation": "Reservar Consulta" },
        fr: { "Software": "Logiciel", "Services": "Services", "Agents": "Agents", "Contact": "Contact", "Payment": "Paiement", "Learn More": "En Savoir Plus", "Book a Consultation": "Réserver Consultation" },
        de: { "Software": "Software", "Services": "Dienstleistungen", "Agents": "Agenten", "Contact": "Kontakt", "Payment": "Zahlung", "Learn More": "Mehr Erfahren", "Book a Consultation": "Beratung Buchen" },
        it: { "Software": "Software", "Services": "Servizi", "Agents": "Agenti", "Contact": "Contatto", "Payment": "Pagamento", "Learn More": "Scopri di Più", "Book a Consultation": "Prenota Consulenza" },
        pt: { "Software": "Software", "Services": "Serviços", "Agents": "Agentes", "Contact": "Contato", "Payment": "Pagamento", "Learn More": "Saiba Mais", "Book a Consultation": "Reservar Consulta" },
        ja: { "Software": "ソフトウェア", "Services": "サービス", "Agents": "エージェント", "Contact": "お問い合わせ", "Payment": "お支払い", "Learn More": "詳細を見る", "Book a Consultation": "相談を予約" },
        zh: { "Software": "软件", "Services": "服务", "Agents": "代理", "Contact": "联系方式", "Payment": "付款", "Learn More": "了解更多", "Book a Consultation": "预约咨询" }
    };
    const langFlags = { en: "🇺🇸", es: "🇪🇸", fr: "🇫🇷", de: "🇩🇪", it: "🇮🇹", pt: "🇵🇹", ja: "🇯🇵", zh: "🇨🇳" };
    const langNames = { en: "English", es: "Español", fr: "Français", de: "Deutsch", it: "Italiano", pt: "Português", ja: "日本語", zh: "中文" };
    function toggleLangMenu() { document.getElementById("langMenu").classList.toggle("open"); }
    function changeLang(code, flag, name) {
        localStorage.setItem("lang", code);
        document.querySelector(".lang-flag").textContent = flag;
        document.querySelector(".lang-name").textContent = name;
        document.getElementById("langMenu").classList.remove("open");
        applyTranslations(code);
    }
    function applyTranslations(code) {
        const t = translations[code]; if (!t) return;
        document.querySelectorAll("h1, h2, h3, h4, h5, h6, p, li, span, a").forEach(el => {
            const text = el.textContent.trim();
            if (t[text]) el.textContent = t[text];
        });
    }
    window.addEventListener("DOMContentLoaded", function() {
        const saved = localStorage.getItem("lang") || "en";
        if (translations[saved]) {
            document.querySelector(".lang-flag").textContent = langFlags[saved];
            document.querySelector(".lang-name").textContent = langNames[saved];
            applyTranslations(saved);
        }
    });
    </script>
    <script>function toggleMobileMenu() { document.getElementById("mobileNav").classList.toggle("open"); }</script>
</body>
</html>
